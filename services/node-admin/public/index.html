<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickGarçom — Painel Administrativo</title>
    <meta name="description" content="Painel administrativo ClickGarçom para gestão de restaurante">
    <link rel="stylesheet" href="/css/design-system.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🍽</div>
            <span class="logo-text">ClickGarçom</span>
        </div>

        <div class="nav-section">
            <div class="nav-label">Menu Principal</div>
            <button class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span> Dashboard
            </button>
            <button class="nav-item" data-page="pedidos">
                <span class="nav-icon">🛒</span> Pedidos
                <span class="badge red" id="badge-pedidos"></span>
            </button>
            <button class="nav-item" data-page="cardapio">
                <span class="nav-icon">🍕</span> Cardápio
            </button>
            <button class="nav-item" data-page="categorias">
                <span class="nav-icon">🏷</span> Categorias
            </button>
            <button class="nav-item" data-page="mesas">
                <span class="nav-icon">🪑</span> Mesas / Comandas
            </button>
        </div>

        <div class="nav-section">
            <div class="nav-label">Relatórios</div>
            <button class="nav-item" data-page="vendas">
                <span class="nav-icon">📈</span> Vendas
            </button>
        </div>

        <div class="sidebar-footer">
            <button class="nav-item" style="color:var(--muted)">
                <span class="nav-icon">⚙️</span> Configurações
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <div class="page-title" id="page-title">Dashboard</div>
                <div class="page-sub" id="page-sub">Visão geral do seu restaurante hoje</div>
            </div>
            <div class="topbar-right">
                <div class="btn-icon" style="position:relative" title="Notificações">
                    🔔
                    <div class="notif-dot"></div>
                </div>
                <div class="avatar">AD</div>
            </div>
        </div>

        <!-- PAGES -->
        <div id="page-dashboard" class="page active"></div>
        <div id="page-pedidos" class="page"></div>
        <div id="page-cardapio" class="page"></div>
        <div id="page-categorias" class="page"></div>
        <div id="page-mesas" class="page"></div>
        <div id="page-vendas" class="page"></div>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/api.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/pedidos.js"></script>
    <script src="/js/pages/cardapio.js"></script>
    <script src="/js/pages/categorias.js"></script>
    <script src="/js/pages/mesas.js"></script>
    <script src="/js/pages/vendas.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
