version: '3.9'

services:
  # ============ DATABASES ============
  postgres:
    image: postgres:17-alpine
    container_name: clickgarcom-postgres
    environment:
      POSTGRES_DB: clickgarcom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clickgarcom-network

  redis:
    image: redis:7-alpine
    container_name: clickgarcom-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - clickgarcom-network

  # ============ MESSAGE BROKER ============
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: clickgarcom-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: clickgarcom
      RABBITMQ_DEFAULT_PASS: clickgarcom123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - clickgarcom-network

  # ============ OBSERVABILITY ============
  prometheus:
    image: prom/prometheus:latest
    container_name: clickgarcom-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - clickgarcom-network

  grafana:
    image: grafana/grafana:latest
    container_name: clickgarcom-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - clickgarcom-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  clickgarcom-network:
    driver: bridge