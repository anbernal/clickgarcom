global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Go API metrics
  - job_name: 'go-api'
    static_configs:
      - targets: ['go-api:8080']
    metrics_path: '/metrics'

  # Go Worker metrics
  - job_name: 'go-worker'
    static_configs:
      - targets: ['go-worker:8081']
    metrics_path: '/metrics'

  # RabbitMQ metrics
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # Postgres exporter (adicionar depois)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis exporter (adicionar depois)
