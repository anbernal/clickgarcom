<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Super Admin · ClickGarçom</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Login Page Overrides ── */
        body {
            background: var(--master-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Animated gradient orbs behind the card */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -120px;
            left: -80px;
            animation: float-orb 12s ease-in-out infinite alternate;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: -100px;
            right: -60px;
            animation: float-orb 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes float-orb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, -30px) scale(1.15);
            }
        }

        /* ── Login Card ── */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 44px 36px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .login-logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: #fff;
        }

        .login-card h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .login-card h1 span {
            color: var(--primary);
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* ── Form Styling ── */
        .login-form .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .login-form .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form .input {
            width: 100%;
            padding: 14px 16px;
            background: var(--master-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 15px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .login-form .input::placeholder {
            color: #475569;
        }

        .login-form .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* ── Error Alert ── */
        .error-alert {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-alert.visible {
            display: flex;
        }

        /* ── Footer ── */
        .login-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: #475569;
        }

        .login-footer span {
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <h1><span>Click</span>Garçom</h1>
            <p class="login-subtitle">Painel Master · Acesso restrito</p>

            <div id="error-alert" class="error-alert">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Credenciais inválidas. Tente novamente.
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label>Operador</label>
                    <input type="text" id="username" class="input" placeholder="Digite seu nome ou identificador" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" class="input" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Entrar</button>
            </form>

            <div class="login-footer">
                Plataforma de gestão de franquias · <span>v1.0</span>
            </div>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('super_admin_authenticated') === 'true') {
            window.location.href = '/';
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');

            if (user && pass === 'admin123@@##') {
                sessionStorage.setItem('super_admin_authenticated', 'true');
                sessionStorage.setItem('super_admin_operator_name', user);
                window.location.href = '/';
            } else {
                errorAlert.classList.add('visible');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // Hide error when user starts typing again
        document.querySelectorAll('.login-form .input').forEach(function (input) {
            input.addEventListener('input', function () {
                document.getElementById('error-alert').classList.remove('visible');
            });
        });
    </script>
</body>

</html>
