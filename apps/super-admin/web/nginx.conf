server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /login {
        try_files /login.html =404;
    }

    location = /login.html {
        try_files /login.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
