<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Minha comanda | ClickGarçom</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="/_config.js"></script>
    <style>
        :root { --portal-ink:#182235; --portal-muted:#77849a; --portal-teal:#109a83; --portal-deep:#0d474b; --portal-bg:#e9efec; --portal-line:#dfe8e5; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; color:var(--portal-ink); background:linear-gradient(145deg,#dce9e4,#f6f9f7 42%,#e9efec); font-family:'Sora',sans-serif; }
        main { width:min(100%,780px); min-height:100dvh; margin:auto; padding:0; }
        .portal-loading,.portal-error { min-height:70vh; display:grid; place-content:center; text-align:center; gap:12px; color:var(--portal-muted); }
        .portal-shell { position:relative; min-height:100dvh; display:grid; grid-template-rows:auto auto auto minmax(280px,1fr) auto; overflow:hidden; background:#f6faf8; box-shadow:0 0 44px rgba(21,48,48,.13); }
        .portal-chat-header { display:flex; align-items:center; justify-content:space-between; gap:12px; min-height:82px; padding:16px 18px; color:#fff; background:linear-gradient(125deg,#0d494b,#087b70); }
        .portal-logo { display:flex; align-items:center; gap:10px; min-width:0; }.portal-logo__mark { display:grid; place-items:center; flex:0 0 auto; width:42px; height:42px; border-radius:14px; background:rgba(255,255,255,.16); box-shadow:inset 0 1px rgba(255,255,255,.2); }.portal-logo strong { display:block; overflow:hidden; max-width:200px; text-overflow:ellipsis; white-space:nowrap; font-size:15px; }.portal-logo small { display:flex; align-items:center; gap:5px; margin-top:4px; color:rgba(255,255,255,.72); font-size:10px; }.portal-logo small i { width:7px; height:7px; border-radius:50%; background:#a9f3ca; box-shadow:0 0 0 3px rgba(169,243,202,.13); }
        .portal-header-code { flex:0 0 auto; padding-left:12px; text-align:right; border-left:1px solid rgba(255,255,255,.18); }.portal-header-code span { display:block; color:rgba(255,255,255,.62); font-size:9px; font-weight:800; letter-spacing:.8px; }.portal-header-code strong { display:block; margin-top:3px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:17px; letter-spacing:1.2px; }
        .portal-summary { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:15px; min-height:64px; padding:10px 18px; background:#fff; border-bottom:1px solid var(--portal-line); }.portal-summary div span { display:block; overflow:hidden; max-width:200px; color:var(--portal-muted); font-size:10px; text-overflow:ellipsis; white-space:nowrap; }.portal-summary div strong { display:block; margin-top:3px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:15px; }.portal-summary-balance { text-align:right; }.portal-summary-balance strong { color:#087861; }.portal-summary button { border:0; padding:9px 11px; border-radius:10px; color:#087861; background:#e4f5ee; font:800 11px 'Sora',sans-serif; cursor:pointer; }
        .portal-notice { margin:10px 14px 0; padding:10px 12px; border:1px solid #caeadc; border-radius:12px; color:#087861; background:#ebf9f2; font-size:11px; line-height:1.45; }
        .portal-conversation { min-height:0; display:grid; grid-template-rows:auto auto minmax(0,1fr); padding:18px 14px 8px; }.portal-chat-label { margin-bottom:10px; color:#8491a1; font-size:9px; font-weight:900; letter-spacing:1px; text-align:center; }.portal-chat-intro { justify-self:center; max-width:430px; margin-bottom:15px; padding:9px 12px; border-radius:10px; color:#5d7080; background:#eaf0ed; font-size:10px; line-height:1.45; text-align:center; }.portal-history { min-height:0; display:grid; align-content:start; gap:9px; overflow:auto; padding:2px 3px 16px; scroll-behavior:smooth; }.portal-chat-empty { justify-self:center; margin-top:26px; padding:12px 16px; border-radius:12px; color:var(--portal-muted); background:#eef3f1; font-size:12px; text-align:center; }
        .portal-message { max-width:min(84%,510px); padding:9px 11px 7px; box-shadow:0 1px 1px rgba(22,52,47,.06); font-size:13px; line-height:1.48; word-break:break-word; }.portal-message span { display:block; }.portal-message small { display:block; margin-top:4px; color:rgba(54,75,82,.62); font-size:9px; text-align:right; }.portal-message--staff { justify-self:start; border-radius:4px 13px 13px 13px; background:#fff; }.portal-message--customer { justify-self:end; border-radius:13px 4px 13px 13px; background:#d9f4e8; }
        .portal-compose { position:sticky; bottom:0; z-index:3; display:grid; grid-template-columns:40px minmax(0,1fr) 42px; align-items:end; gap:8px; padding:10px 14px max(12px,env(safe-area-inset-bottom)); border-top:1px solid var(--portal-line); background:rgba(255,255,255,.97); box-shadow:0 -8px 20px rgba(25,50,48,.04); }.portal-compose textarea { min-height:42px; max-height:120px; width:100%; resize:none; overflow:auto; padding:11px 13px; border:1px solid #d6e0dc; border-radius:21px; color:var(--portal-ink); background:#f7faf9; font:13px/1.4 'Sora',sans-serif; outline:none; }.portal-compose textarea:focus { border-color:var(--portal-teal); box-shadow:0 0 0 3px rgba(16,154,131,.12); }.portal-compose button { border:0; cursor:pointer; font-family:'Sora',sans-serif; }.portal-compose-plus { width:37px; height:37px; margin-bottom:2px; border-radius:50%; color:#087861; background:#e3f4ed; font-size:23px; line-height:1; }.portal-compose-send { width:40px; height:40px; border-radius:50%; color:#fff; background:var(--portal-teal); font-size:17px; transform:rotate(-24deg); box-shadow:0 5px 12px rgba(16,154,131,.26); }.portal-compose-send:disabled { opacity:.55; }
        .portal-sheet { position:absolute; z-index:6; right:0; bottom:0; left:0; display:none; max-height:78dvh; overflow:auto; padding:10px 16px calc(24px + env(safe-area-inset-bottom)); border-radius:24px 24px 0 0; background:#fff; box-shadow:0 -18px 48px rgba(16,39,41,.24); }.portal-sheet--open { display:block; animation:portal-sheet-in .24s ease-out; }.portal-sheet__handle { width:40px; height:4px; margin:0 auto 15px; border-radius:4px; background:#dce5e1; }.portal-sheet__head { display:flex; align-items:center; justify-content:space-between; gap:14px; }.portal-sheet__head span { color:#8190a0; font-size:9px; font-weight:900; letter-spacing:1px; }.portal-sheet__head h2 { margin:3px 0 0; font-size:20px; letter-spacing:-.7px; }.portal-sheet__head button { width:34px; height:34px; border:0; border-radius:10px; color:#5e6b79; background:#f0f3f3; cursor:pointer; font-size:17px; }.portal-sheet__metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }.portal-sheet__metrics div { padding:11px 9px; border-radius:12px; background:#f3f7f5; }.portal-sheet__metrics span { display:block; color:#83909d; font-size:9px; font-weight:800; text-transform:uppercase; }.portal-sheet__metrics strong { display:block; margin-top:5px; color:#173e42; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }.portal-sheet__section { padding:15px 0; border-top:1px solid #e8efec; }.portal-sheet__section h3 { margin:0; font-size:15px; }.portal-sheet__section h3 span { margin-left:4px; color:#7c8a99; font-size:11px; }.portal-sheet__section p,.portal-sheet__empty { margin:5px 0 0; color:var(--portal-muted); font-size:11px; line-height:1.45; }.portal-menu-list { display:grid; gap:8px; margin-top:13px; }.portal-menu-item { display:grid; grid-template-columns:1fr auto; gap:10px; padding:12px; border:1px solid #e2ebe7; border-radius:13px; }.portal-menu-item h3 { margin:0; font-size:13px; }.portal-menu-item p { margin-top:3px; font-size:10px; }.portal-menu-price { display:block; margin-top:7px; color:#087861; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; font-weight:800; }.portal-menu-item button,.portal-cart button { border:0; border-radius:9px; cursor:pointer; font:800 11px 'Sora',sans-serif; }.portal-menu-item button { align-self:center; padding:9px 10px; color:#087861; background:#e4f5ee; }.portal-cart { display:grid; gap:9px; margin-top:10px; padding:12px; border-radius:12px; background:#edf7f2; }.portal-cart-row { display:flex; justify-content:space-between; gap:10px; font-size:11px; }.portal-cart-row button { min-width:24px; margin-left:5px; color:#a44141; background:#fbeaea; }.portal-cart-submit { padding:11px; color:#fff; background:var(--portal-teal); }.portal-cart-submit:disabled { opacity:.6; cursor:wait; }.portal-items { margin:10px 0 0; padding:0; list-style:none; }.portal-item { display:flex; justify-content:space-between; gap:12px; padding:10px 0; border-top:1px solid #edf1ef; }.portal-item:first-child { border-top:0; padding-top:0; }.portal-item__name { font-size:12px; font-weight:800; }.portal-item__status { display:block; margin-top:4px; color:var(--portal-muted); font-size:10px; }.portal-item__price { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; font-weight:800; white-space:nowrap; }
        @keyframes portal-sheet-in { from { transform:translateY(18px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @media (min-width:781px) { body { padding:20px; }.portal-shell { min-height:calc(100dvh - 40px); border-radius:25px; }.portal-sheet { border-radius:24px; }.portal-summary { padding-right:22px; } }
        @media (max-width:410px) { .portal-chat-header { padding:14px; }.portal-logo strong { max-width:150px; }.portal-summary { gap:9px; padding:9px 13px; }.portal-summary div span { max-width:112px; }.portal-summary button { padding:8px; }.portal-conversation { padding-right:10px; padding-left:10px; }.portal-compose { padding-right:10px; padding-left:10px; } }
    </style>
</head>
<body>
    <main id="portal-root"><div class="portal-loading">Carregando sua comanda...</div></main>
    <script src="/js/portal.js"></script>
</body>
</html>
