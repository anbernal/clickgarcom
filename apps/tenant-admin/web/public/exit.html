<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validação de saída | ClickGarçom</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <style>
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: linear-gradient(145deg, #0f1923, #0d2b3e); font-family: Sora, sans-serif; color: #fff; }
        .exit-card { width: min(460px, 100%); padding: 32px; border: 1px solid rgba(255,255,255,.12); border-radius: 24px; background: rgba(255,255,255,.08); box-shadow: 0 24px 80px rgba(0,0,0,.28); text-align: center; }
        .exit-icon { font-size: 48px; margin-bottom: 12px; }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { color: rgba(255,255,255,.72); line-height: 1.55; }
        .exit-status { margin-top: 24px; padding: 16px; border-radius: 14px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.82); }
        .exit-status.success { background: rgba(34,197,94,.16); color: #bbf7d0; }
        .exit-status.error { background: rgba(239,68,68,.16); color: #fecaca; }
        .exit-code { margin-top: 18px; color: rgba(255,255,255,.62); font: 700 13px ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
</head>
<body>
    <main class="exit-card">
        <div class="exit-icon" id="exit-icon">🔐</div>
        <h1 id="exit-title">Validando sua saída</h1>
        <p id="exit-description">Estamos conferindo pedidos e pagamentos da comanda.</p>
        <div class="exit-status" id="exit-status">Aguarde um momento...</div>
        <div class="exit-code" id="exit-code"></div>
    </main>
    <script src="/_config.js"></script>
    <script src="/js/exit.js"></script>
</body>
</html>
