<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickGarçom — Painel Administrativo</title>
    <meta name="description" content="Painel administrativo ClickGarçom para gestão de restaurante">
    <link rel="stylesheet" href="/css/design-system.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🍽</div>
            <span class="logo-text">ClickGarçom</span>
        </div>

        <div class="nav-section">
            <div class="nav-label">Menu Principal</div>
            <button class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span> Dashboard
            </button>
            <button class="nav-item" data-page="wallet">
                <span class="nav-icon">💳</span> Carteira & Assinatura
            </button>
            <button class="nav-item" data-page="extratoMensagens">
                <span class="nav-icon">🧾</span> Extrato de Mensagens
            </button>
            <button class="nav-item" data-page="pedidos">
                <span class="nav-icon">🛒</span> Pedidos
                <span class="badge red" id="badge-pedidos"></span>
            </button>
            <a href="/kds.html?panel=attendance" target="_blank" rel="noopener noreferrer" class="nav-item">
                <span class="nav-icon">🛎</span> Atendimento (KDS)
            </a>
            <button class="nav-item" data-page="cardapio">
                <span class="nav-icon">🍕</span> Cardápio
            </button>
            <button class="nav-item" data-page="categorias">
                <span class="nav-icon">🏷</span> Categorias
            </button>
            <button class="nav-item" data-page="mesas">
                <span class="nav-icon">🪑</span> Mesas / Comandas
            </button>
        </div>

        <div class="nav-section">
            <div class="nav-label">Relatórios</div>
            <button class="nav-item" data-page="vendas">
                <span class="nav-icon">📈</span> Vendas
            </button>
            <a href="/kds.html" target="_blank" class="nav-item">
                <span class="nav-icon">🍳</span> KDS (Cozinha)
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="nav-item" id="btn-expediente">
                <span class="nav-icon">🔴</span> Carregando...
            </button>
            <button class="nav-item" data-page="configuracoes" style="margin-top: 10px;">
                <span class="nav-icon">⚙️</span> Configurações
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <!-- GLOBAL TOPBAR -->
        <div class="topbar" id="global-topbar">
            <div>
                <div class="page-title" id="page-title">Dashboard</div>
                <div class="page-sub" id="page-sub">Visão geral do seu restaurante hoje</div>
            </div>
            <div class="topbar-right" id="topbar-right-actions">
                <div class="btn-icon" style="position:relative" title="Notificações">
                    🔔
                    <div class="notif-dot"></div>
                </div>
                <div class="avatar">AD</div>
                <button class="btn-icon" id="btn-logout" title="Sair">
                    ⏻
                </button>
            </div>
        </div>

        <!-- PAGES -->
        <div id="page-dashboard" class="page active"></div>
        <div id="page-wallet" class="page"></div>
        <div id="page-extratoMensagens" class="page"></div>
        <div id="page-pedidos" class="page"></div>
        <div id="page-cardapio" class="page"></div>
        <div id="page-categorias" class="page"></div>
        <div id="page-mesas" class="page">
            <div class="layout-content">
                <main class="main-body" id="main-content">
                    <div
                        style="margin-bottom: 20px; padding: 14px 16px; border-radius: 12px; background: rgba(75,123,229,0.08); border: 1px solid rgba(75,123,229,0.18); color: var(--text-primary, #1f2937);">
                        O aceite do primeiro contato agora acontece em
                        <strong>Atendimento (KDS)</strong>.
                    </div>
                    <div id="mesas-view-container">
                        <div id="mesas-grid-container">
                            <!-- Grid de Mesas Injetado dinamicamente -->
                        </div>
                    </div>
                </main>
            </div>
        </div>
        <div id="page-vendas" class="page"></div>
        <div id="page-configuracoes" class="page"></div>
</main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="/_config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/pages/wallet.js"></script>
    <script src="/js/pages/extrato-mensagens.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/pedidos.js"></script>
    <script src="/js/pages/cardapio.js"></script>
    <script src="/js/pages/categorias.js"></script>
    <script src="/js/pages/mesas.js"></script>
    <script src="/js/pages/vendas.js"></script>
    <script src="/js/pages/configuracoes.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
